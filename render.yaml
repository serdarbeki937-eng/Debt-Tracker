services:
  - type: web
    name: debt-tracker-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: cd artifacts/api-server && pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: debt-tracker-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: debt-tracker-db
    engine: postgres
    plan: free
    version: 15
